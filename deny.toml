[advisories]
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CDLA-Permissive-2.0",
    "OpenSSL",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "deny"
# "deny" is safe: Cargo.toml has no wildcard version deps (verified 2026-05-07)
wildcards = "deny"

# Unavoidable duplicate crate versions as of 2026-05-07.
# Each entry documents the root cause and the blocking dependency that prevents unification.

[[bans.skip]]
name = "core-foundation"
version = "0.9"
reason = "keyring v3.6.3 requires core-foundation 0.9; reqwest/rustls-platform-verifier requires 0.10. Two separate macOS keychain client crates are on different major versions; neither can be bumped without a keyring or reqwest major release."

[[bans.skip]]
name = "getrandom"
version = "0.2"
reason = "redox_users v0.5.2 (via dirs v6) requires getrandom 0.2; getrandom 0.3 and 0.4 are pulled by rand_core 0.9 and tempfile respectively. Three semver-incompatible majors required by independent transitive deps; unification blocked upstream."

[[bans.skip]]
name = "getrandom"
version = "0.3"
reason = "rand_core 0.9 / jobserver (via cc/aws-lc-sys build dep) requires getrandom 0.3; other deps require 0.2 and 0.4. Three semver-incompatible majors; unification blocked upstream."

[[bans.skip]]
name = "getrandom"
version = "0.4"
reason = "tempfile v3.27.0 (via dialoguer, insta, proptest) requires getrandom 0.4; other deps require 0.2 and 0.3. Three semver-incompatible majors; unification blocked upstream."

[[bans.skip]]
name = "r-efi"
version = "5"
reason = "getrandom 0.3 (via rand_core/cc/aws-lc-sys) pulls r-efi 5; getrandom 0.4 (via tempfile) pulls r-efi 6. Duplicate is a transitive side-effect of the getrandom split; cannot be resolved without upstream unification."

[[bans.skip]]
name = "r-efi"
version = "6"
reason = "getrandom 0.4 (via tempfile/dialoguer/insta/proptest) pulls r-efi 6; getrandom 0.3 pulls r-efi 5. Transitive side-effect of getrandom version split; unification blocked upstream."

# Note: rand 0.9 + rand 0.10 (and rand_core 0.9 + 0.10) both appear in
# Cargo.lock post-#327 but cargo-deny correctly does NOT flag them as
# multiple-versions violations. The active dependency graph contains only
# rand 0.10 (jr direct dep); rand 0.9.4 is a Cargo cross-platform/feature
# placeholder for proptest's transitive needs that never enters the actual
# build. Verified empirically (2026-05-26): adding `[[bans.skip]]` entries
# for rand/rand_core triggers `warning[unmatched-skip]` (rand 0.9 "not
# encountered") and `warning[unnecessary-skip]` (rand 0.10 "only one
# version") in cargo-deny 0.19.6. Intentionally NOT skipped here. If a
# future cargo-deny upgrade starts flagging these, add the paired skips
# at that point with the actual root-cause reason text. See PR #327 F5
# adversarial review (`.factory/phase-f2-spec-evolution/adversarial-327-pass-1.md`).

[[bans.skip]]
name = "security-framework"
version = "2"
reason = "keyring v3.6.3 requires security-framework 2.x; rustls-platform-verifier/rustls-native-certs require security-framework 3.x. Blocked by keyring not yet releasing support for security-framework 3."

[[bans.skip]]
name = "serde_spanned"
version = "0.6"
reason = "figment v0.10.19 depends on toml 0.8 which requires serde_spanned 0.6; jr directly depends on toml 1.x which requires serde_spanned 1.x. Blocked by figment not yet upgrading to toml 1.x."

[[bans.skip]]
name = "serde_spanned"
version = "1"
reason = "jr directly depends on toml 1.x (serde_spanned 1.x); figment 0.10.19 pulls toml 0.8 (serde_spanned 0.6). Dual version is unavoidable until figment upgrades to toml 1.x."

[[bans.skip]]
name = "thiserror"
version = "1"
reason = "jni v0.21.1 (via rustls-platform-verifier/reqwest) requires thiserror 1.x; jr and redox_users use thiserror 2.x. Blocked by jni not yet releasing thiserror 2.x support."

[[bans.skip]]
name = "thiserror"
version = "2"
reason = "jr and redox_users (via dirs) require thiserror 2.x; jni 0.21.1 (via rustls-platform-verifier) requires thiserror 1.x. Dual version unavoidable until jni releases with thiserror 2.x."

[[bans.skip]]
name = "thiserror-impl"
version = "1"
reason = "proc-macro companion to thiserror 1.x, pulled by jni v0.21.1 via rustls-platform-verifier. Unavoidable as long as thiserror 1.x is present (see thiserror skip above)."

[[bans.skip]]
name = "thiserror-impl"
version = "2"
reason = "proc-macro companion to thiserror 2.x, used by jr directly and redox_users. Unavoidable as long as thiserror 2.x is present alongside thiserror 1.x (see thiserror skip above)."

[[bans.skip]]
name = "toml"
version = "0.8"
reason = "figment v0.10.19 requires toml 0.8; jr directly depends on toml 1.x for TOML 1.1 spec support. Blocked by figment not yet releasing a toml 1.x-compatible version."

[[bans.skip]]
name = "toml"
version = "1"
reason = "jr directly depends on toml 1.x; figment 0.10.19 pulls toml 0.8. Dual version unavoidable until figment upgrades."

[[bans.skip]]
name = "toml_datetime"
version = "0.6"
reason = "toml 0.8 (via figment) requires toml_datetime 0.6; toml 1.x requires toml_datetime 1.x. Transitive side-effect of toml split; unification blocked until figment upgrades."

[[bans.skip]]
name = "toml_datetime"
version = "1"
reason = "toml 1.x (direct dep) requires toml_datetime 1.x; toml 0.8 (via figment) requires 0.6. Unavoidable until figment upgrades to toml 1.x."

# windows-sys: FOUR versions in Cargo.lock as of S-WIN-3.
#   0.45.0 — jni v0.21.1 (via rustls-platform-verifier/reqwest)
#   0.52.0 — ring (cryptography dep of rustls)
#   0.60.2 — keyring v3.6.3 windows-native feature (Win32_Security_Credentials)
#   0.61.2 — clap, tokio, reqwest and the broad dependency graph
#
# THREE are skipped (0.45, 0.60, 0.61); the single canonical UN-skipped version
# is windows-sys 0.52.0 (via ring). N-1: 4 versions − 3 skips = 1 remaining,
# which satisfies cargo-deny's "single remaining version" requirement.
#
# Adding a 0.52 skip would leave ZERO un-skipped versions (unnecessary-skip
# error). Do NOT add a 0.52 skip — 0.52.0 is the canonical un-skipped version
# by design, parallel to windows-targets 0.52.6 documented below.
#
# Maintenance caveat (F-WIN3-RC-103): if ring later bumps its windows-sys minor
# off 0.52 (or if jni drops 0.45, or a new lineage is added), the canonical
# un-skipped version changes. The guard is `cargo deny check` in CI; a future
# dep bump may require adding or removing skip entries here.

[[bans.skip]]
name = "windows-sys"
version = "0.45"
reason = "jni v0.21.1 (via rustls-platform-verifier/reqwest) requires windows-sys 0.45; ring requires 0.52, keyring windows-native requires 0.60, and the broad graph (clap/tokio/reqwest) requires 0.61. Four semver-incompatible 0.x versions; 0.45/0.60/0.61 are skipped, leaving 0.52.0 (ring) as the canonical un-skipped version."

[[bans.skip]]
name = "windows-sys"
version = "0.60"
reason = "keyring v3.6.3 windows-native feature requires windows-sys 0.60 (Win32_Security_Credentials); jni requires 0.45, ring requires 0.52, and the broad graph (clap/tokio/reqwest) requires 0.61. Four semver-incompatible 0.x versions; 0.45/0.60/0.61 are skipped, leaving 0.52.0 (ring) as the canonical un-skipped version. Unification blocked upstream until keyring bumps windows-sys."

[[bans.skip]]
name = "windows-sys"
version = "0.61"
reason = "clap, tokio, reqwest and most of the dependency graph use windows-sys 0.61; jni 0.21.1 requires 0.45, ring requires 0.52, and keyring windows-native requires 0.60. Four semver-incompatible 0.x versions; 0.45/0.60/0.61 are skipped, leaving 0.52.0 (ring) as the canonical un-skipped version. Unification blocked until jni and keyring upgrade."

# windows-targets and windows_* arch crates: transitive sub-deps of windows-sys.
# S-WIN-3 adds 17 entries total (1 windows-sys 0.60 + 2 windows-targets + 14 = 7 arch crates × 2 tiers):
#   windows-sys 0.45 (via jni) pulls windows-targets 0.42.2 and windows_* 0.42.2;
#   windows-sys 0.52 (via ring) pulls windows-targets 0.52.6 and windows_* 0.52.6;
#   windows-sys 0.60 (via keyring v3.6.3 windows-native) pulls windows-targets 0.53.5
#   and windows_* 0.53.1. These are unavoidable until jni and keyring converge on the
#   same windows-sys version. (S-WIN-3, C-V2(b) research finding)
#
# The 7 skipped arch crates are: windows_aarch64_gnullvm, windows_aarch64_msvc,
# windows_i686_gnu, windows_i686_msvc, windows_x86_64_gnu, windows_x86_64_gnullvm,
# windows_x86_64_msvc. windows_i686_gnullvm is deliberately NOT skipped: it exists
# in Cargo.lock only at 0.52.6 and 0.53.1 (the i686-gnullvm stub did not exist in
# the windows 0.42 generation), so only two versions are present and cargo-deny
# requires no skip — skipping either would produce an `unmatched-skip` error.
#
# Why no `[[bans.skip]]` for windows-targets/windows_* version "0.52"?
#
# cargo-deny's multiple-versions = "deny" fires when 2+ UN-SKIPPED versions of the
# same crate remain in the dependency graph. With three versions in Cargo.lock
# (0.42 from jni, 0.52 from ring, 0.53 from keyring windows-native), we only need
# to skip N-1 = 2 of them. The two skips below (0.42 and 0.53) leave exactly ONE
# un-skipped canonical version — 0.52.6 (pulled by ring via windows-sys 0.52) —
# which satisfies cargo-deny's "single remaining version" requirement.
#
# Adding a 0.52 skip would leave ZERO un-skipped versions, which is unnecessary.
# A future reviewer should NOT add a 0.52 skip; doing so would produce an
# `unnecessary-skip` warning and is semantically wrong — 0.52.6 is the canonical
# un-skipped version by design.
#
# Maintenance caveat (F-WIN3-RC-103): this skip set is correct for the CURRENT
# dependency topology. A future dep bump that changes the windows-sys/windows-targets
# version set (e.g. ring updating its windows-sys minor, or jni dropping 0.45, or a
# new lineage being added) could leave zero canonical un-skipped versions
# (→ unnecessary-skip warnings) or introduce a new un-skipped duplicate
# (→ multiple-versions error). The guard is `cargo deny check` in CI; there is no
# separate canonical-version invariant test (process-gap tracked by orchestrator).

[[bans.skip]]
name = "windows-targets"
version = "0.42"
reason = "transitive sub-dep of windows-sys 0.45 (via jni/rustls-platform-verifier); windows-sys 0.60 (via keyring windows-native) pulls windows-targets 0.53.5. Unavoidable until jni and keyring converge on the same windows-sys version."

[[bans.skip]]
name = "windows-targets"
